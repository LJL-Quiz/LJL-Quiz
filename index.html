  <link rel="stylesheet" href="style.css">

<body id="quizBody">

<!-- Controls Top Left (Theme Toggle) -->
<div class="controls top-left">
    <button class="control-btn" id="themeToggle" title="Theme wechseln (Dark/Light)">🌙</button>
</div>


<!-- Quiz Container -->
<div id="quiz-container">
    <!-- Menü -->
    <nav>
      <a href="#" onclick="selectCategory('spiele'); return false;">🎮 Spiele</a>
      <a href="#" onclick="selectCategory('serien'); return false;">📺 Serien</a>
      <a href="#" onclick="selectCategory('filme'); return false;">🎬 Filme</a>
    </nav>

    <!-- Hier ist der Titel -->
    <h1 id="quiz-title">Quiz für Gamer</h1>
    <p style="font-size: 1.3em; margin-bottom: 40px;">Wähle oben eine Kategorie, um zu starten!</p>

    <!-- Bildanzeige (wird durch JS gesteuert) -->
    <img id="question-img" src="" alt="Fragebild" style="display:none;" />
    <h2 id="question">Bitte wähle eine Kategorie!</h2>

    <!-- Antwort-Buttons (sichtbar, aber inaktiv bis zur Kategorieauswahl) -->
    <button onclick="checkAnswer(0)" id="a"></button>
    <button onclick="checkAnswer(1)" id="b"></button>
    <button onclick="checkAnswer(2)" id="c"></button>
    <button onclick="checkAnswer(3)" id="d"></button>

    <!-- Ergebnisanzeige -->
    <p id="result"></p>
</div >


<!-- ⚙️ DEV SETTINGS MODAL (Der "Settings Wheel") -->
<div id="settingsModal">
    <div style="background-color: var(--secondary-bg); margin: 5% auto; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);">
        <h2 style="color: var(--primary-accent); border-bottom: 1px solid #444; padding-bottom: 10px;">⚙️ Entwickler-Konsolen</h2>
        
        <!-- Dev Testing Area -->
        <div style="margin-top: 20px; text-align: left; background: var(--bg-color); padding: 15px; border-radius: 6px;">
            <h3 style="margin-top: 0;">Aktueller Zustand</h3>
            <p><strong>Theme Mode:</strong> <span id="themeStatus">Laden...</span></p>
            <p><strong>Score/Fragen:</strong> <span id="scoreStatus">0 / 0</span></p>
            <p><strong>Quiz Index (Nächste Frage):</strong> <span id="indexStatus">0</span></p>
        </div>

        <!-- Debugging-Bereich -->
        <div style="margin-top: 30px; text-align: left; background: var(--bg-color); padding: 15px; border-radius: 6px;">
            <h3 style="color: var(--primary-accent);">🛠️ Debugging & API Test</h3>
            <!-- Passwort Eingabe -->
            <input type="password" id="debugPassword" placeholder="Passwort eingeben (adminquiz)">
            <button id="showDebugBtn" style="padding: 10px; margin-top: 10px;">Debug-Panel anzeigen</button>

            <!-- API Trigger Input -->
            <p style="margin-top: 20px;">API Test Command:</p>
            <input type="text" id="apiCommandInput" placeholder="anime_quiz">
            <button onclick="runApiTest()" style="padding: 10px; margin-left: 10px;">Ausführen</button>

            <!-- Debug Panel Container (Wird erst bei richtigem Passwort sichtbar) -->
            <div id="debugPanelContent" style="display: none;"></div>
        </div>


        <!-- Schließen-Button -->
        <button onclick="document.getElementById('settingsModal').style.display='none';" style="background-color: red; margin-top: 25px;">Schließen (X)</button>
    </div >
</div >

<!-- Controls Bottom Right (GitHub Link & Dev Settings Button) -->
<div class="controls bottom-right">
    <button class="control-btn" id="devSettingsBtn" title="Entwickler-Tools">⚙️</button>
</div>

<!-- GitHub Link Button -->
<div class="controls bottom-right" style="margin-top: 15px;">
    <a href="https://github.com/LJL-Quiz/LJL-Quiz" target="_blank" class="control-link">🔗 Zu GitHub</a>
</div>

<!-- Verknüpfung zur Optik und Logik! -->

// GLOBAL STATE & HELPER FUNCTIONS
// ===========================================================
let questions = []; 
let questionIndex = 0;
let score = 0;
const allQuestions = [

  {question: "SEGA Maskottchen?", answers:["Mario","Sonic","Crash","Rayman"], correct:1, img:"/LJL-Quiz/Resources/images/sega.jpg", category:"spiele"},

  // 📺 SERIEN
  {question: "Wer ist das?", answers:["Walter White","Jesse Pinkman","Saul Goodman","Hank"], correct:0, img:"", category:"serien"}, // KEIN BILD (Bleibt leer)
  {question: "Wer ist Glenn?", answers:["The Walking Dead","Lost","Breaking Bad","Dark"], correct:0, img:"/LJL-Quiz/Resources/images/The_Walking_Dead.jpg", category:"serien"}, 
  {question: "Serie mit tödlichen Spielen?", answers:["Squid Game","Alice in Borderland","Saw","Dark"], correct:0, img:"/LJL-Quiz/Resources/images/serien_Die squid game frage.jpg", category:"serien"}, 
  {question: "Walter Whites Fach?", answers:["Mathe","Chemie","Bio","Physik"], correct:1, img:"/LJL-Quiz/Resources/images/serien_Die Walter white fach frage.jpg", category:"serien"},

  {question: "TWD W auf Stirn?", answers:["Owen","Negan","Rick","Daryl"], correct:0, img:"/LJL-Quiz/Resources/images/The_Walking_Dead.jpg", category:"serien"}, // Achtung: Hier ist das Bild doppelt (siehe unten)

  {question: "Kind namens Malcolm?", answers:["Malcolm Mittendrin","Modern Family","Friends","Office"], correct:0, img:"/LJL-Quiz/Resources/images/serien_melcolm mittendrin.jpg", category:"serien"}, 
  // 🎬 FILME
  {question: "Wer ist das?", answers:["Iron Man","Batman","Superman","Thor"], correct:0, img:"/LJL-Quiz/Resources/images/movie_Wer ist das(iron-man).jpg", category:"filme"},
  {question: "Wer ist Jason?", answers:["Jason Voorhees","Freddy","Michael Myers","Ghostface"], correct:0, img:"/LJL-Quiz/Resources/images/movie_Wer ist das(jason voorhees).jpg", category:"filme"},
  {question: "Hauself?", answers:["Dobby","Kreacher","Winky","Hedwig"], correct:0, img:"/LJL-Quiz/Resources/images/movie_Harry Potter.jpg", category:"filme"},

  {question: "Scream Regel?", answers:["Bin gleich zurück","Hallo","Lauf","Hilfe"], correct:0, img:"/LJL-Quiz/Resources/images/movie_was darf man nicht im scream Universum sagen.jpg", category:"filme"},
  {question: "Freitag der 13 Killer Teil 1?", answers:["Pamela Voorhees","Jason","Freddy","Ghostface"], correct:0, img:"/LJL-Quiz/Resources/images/movi_Wer ist der killer in Freitag der 13 Teil 1.jpg", category:"filme"},
  {question: "Simba Böser Onkel?", answers:["Scar","Mufasa","Zazu","Rafiki"], correct:0, img:"/LJL-Quiz/Resources/images/movie_König Der Löwen.jpg", category:"filme"},
  {question: "Stunts selbst?", answers:["Jackie Chan","Tom Cruise","The Rock","Vin Diesel"], correct:0, img:"/LJL-Quiz/Resources/images/movie_Welcher Schauspieler macht alle stunts selber?.jpg", category:"filme"},
  {question: "Erstes Dino Tier?", answers:["Brachiosaurus","T-Rex","Raptor","Triceratops"], correct:0, img:"/LJL-Quiz/Resources/images/movie_Welchen dino hat alan grand zuerst gesehen.jpg", category:"filme"}
];

// Globale Variable für die aktuelle Frage, um Antworten zu synchronisieren
let currentShuffledAnswers = []; 


/**
 * Fisher-Yates Shuffle Algorithm - Mischt ein Array an Ort und Stelle.
 */
function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

/**
 * Sucht den neuen Index der korrekten Antwort nach dem Shuffling.
 */
function findNewCorrectIndex(originalAnswers, correctOriginalIndex) {
    const originalAnswerValue = originalAnswers[correctOriginalIndex];
    const shuffled = [...originalAnswers]; 
    shuffleArray(shuffled);
    return shuffled.findIndex(answer => answer === originalAnswerValue);
}


// ===========================================================
// QUIZ LOGIC (Unverändert, da fehlerfrei)
// ===========================================================

function selectCategory(cat){
    let filteredQuestions = allQuestions.filter(q => q.category === cat);
    shuffleArray(filteredQuestions); // Fragen zufällig mischen
    questions = filteredQuestions;
    questionIndex = 0;
    score = 0;
    document.getElementById("result").innerText = "";
    const resultElement = document.getElementById('result');
    resultElement.className = ''; 
    loadQuestion();
}

function loadQuestion(){
    let q = questions[questionIndex];
    currentShuffledAnswers = []; // Reset des Antwort-Arrays für die neue Frage

    if(questions.length === 0){
        document.getElementById("question").innerText = "Bitte wähle eine Kategorie!";
        // ... (UI Cleanup bei leerem Quiz) ...
        document.getElementById("a").style.display = "none";
        document.getElementById("b").style.display = "none";
        document.getElementById("c").style.display = "none";
        document.getElementById("d").style.display = "none";
        document.getElementById("question-img").src = ""; 
        document.getElementById("question-img").style.display = "none";
        return; 
    }

    // --- NEUER SCHRITT: Antworten mischen und global speichern ---
    const originalAnswers = q.answers;
    currentShuffledAnswers = [...originalAnswers]; // Kopie erstellen und mischen
    shuffleArray(currentShuffledAnswers); 
    // --- ENDE NEUER SCHRITT ---

    document.getElementById("question").innerText = q.question;
    
    // Setze die Antworten basierend auf der gemischten Reihenfolge (0=A, 1=B, 2=C, 3=D)
    document.getElementById("a").innerText = currentShuffledAnswers[0];
    document.getElementById("b").innerText = currentShuffledAnswers[1];
    document.getElementById("c").innerText = currentShuffledAnswers[2];
    document.getElementById("d").innerText = currentShuffledAnswers[3];

    // Buttons anzeigen, falls eine Frage vorhanden ist
    document.getElementById("a").style.display = "inline-block";
    document.getElementById("b").style.display = "inline-block";
    document.getElementById("c").style.display = "inline-block";
    document.getElementById("d").style.display = "inline-block";

    // Bild setzen (wenn img vorhanden ist)
    if(q.img && q.img !== "") {
        document.getElementById("question-img").src = q.img;
        document.getElementById("question-img").style.display = "block";
    } else {
        document.getElementById("question-img").style.display = "none"; 
    }
}

function checkAnswer(ans){
    const currentQuestion = questions[questionIndex];
    // Der korrekte Antworttext ist der Text des Elements im Original-Array
    const correctAnswerText = currentQuestion.answers[currentQuestion.correct];
    
    // Der angeklickte Wert ist der Text des Buttons, den der Nutzer gedrückt hat (aus dem gemischten Array)
    const selectedAnswerText = currentShuffledAnswers[ans]; 

    const resultElement = document.getElementById("result"); // Referenz auf das Ergebnis-Element

    // Logikprüfung: Ist der ausgewählte Text gleich dem korrekten Antworttext?
    if(selectedAnswerText === correctAnswerText){
        score++;
        resultElement.innerText = "✅ Richtig!";
        resultElement.className = 'correct'; 
    } else {
        resultElement.innerText = `❌ Falsch! Die richtige Antwort war: ${correctAnswerText}`;
        resultElement.className = 'incorrect'; 
    }

    // WICHTIG: Feedback nach kurzer Zeit automatisch entfernen
    setTimeout(() => {
        resultElement.innerText = "";
        resultElement.className = ''; // ENTFERNT ALLE KLASSEN (rot/grün)
        
        questionIndex++;
        if(questionIndex < questions.length){
            loadQuestion(); 
        } else {
            // Ende des Quizs
            document.body.innerHTML = `
                <h1 style="color:#58a6ff;">🥳 QUIZ BEENDET!</h1>
                <p style="font-size: 2em; margin-top: 30px;">Du hast ${score} von ${questions.length} Fragen richtig beantwortet!</p>
                <button onclick='window.location.reload()' style='font-size:1.5em; padding:20px 40px;'>Nochmal spielen</button>
            `;
        }
    }, 1800); // Pause von 1,8 Sekunden
}

// ===========================================================
// FUNKTIONALITÄT (THEME & DEV) - ERWEITERT MIT DEBUGGING UND API-TEST
// ===========================================================

const body = document.getElementById('quizBody');
const themeToggleBtn = document.getElementById('themeToggle');
const devSettingsBtn = document.getElementById('devSettingsBtn');
const settingsModal = document.getElementById('settingsModal');
const themeStatusSpan = document.getElementById('themeStatus');


// NEUE GLOBAL VARIABLE FÜR SICHERHEIT (Passwort)
const DEBUG_PASSWORD = "adminquiz"; 


function toggleTheme() {
    body.classList.toggle('light-mode');
    if (body.classList.contains('light-mode')) {
        localStorage.setItem('theme', 'light');
        themeToggleBtn.innerHTML = '☀️'; 
        document.getElementById('themeStatus').innerText = 'FLASH BANG MODE AKTIV';
    } else {
        localStorage.setItem('theme', 'dark');
        themeToggleBtn.innerHTML = '🌙'; 
        document.getElementById('themeStatus').innerText = 'DARK MODE AKTIV';
    }
}

function checkTheme() {
    const savedTheme = localStorage.getItem('theme') || 'dark'; 
    if (savedTheme === 'light') {
        body.classList.add('light-mode');
        themeToggleBtn.innerHTML = '☀️'; 
        document.getElementById('themeStatus').innerText = 'FLASH BANG AKTIV';
    } else {
        themeToggleBtn.innerHTML = '🌙'; 
        document.getElementById('themeStatus').innerText = 'DARK MODE AKTIV';
    }
}


// NEUE FUNKTION: Zeigt das Debug-Panel an, wenn Passwort korrekt ist.
function showDebugPanel() {
    const passwordInput = document.getElementById('debugPassword');
    const debugButton = document.getElementById('showDebugBtn');
    const debugPanel = document.getElementById('debugPanelContent');

    if (passwordInput.value === DEBUG_PASSWORD) {
        // 1. Bilder-Übersicht erstellen
        let imageListHTML = '<h3 style="color: var(--primary-accent);">🖼️ Bildübersicht im Quellcode:</h3><ul>';
        allQuestions.forEach((q, index) => {
            const imgName = q.img && q.img !== "" ? q.img : "KEIN BILD";
            imageListHTML += `<li><strong>Q${index + 1}:</strong> ${q.question} &rarr; Pfad: ${imgName}</li>`;
        });
        imageListHTML += '</ul>';


        // 2. Aktuellen Zustand des Quizs anzeigen (Sehr detailliert)
        let stateDump = `<h3 style="color: var(--primary-accent);">⚙️ Interner Quiz-Zustand (${questions[questionIndex]?.category || 'N/A'})</h3>`;
        stateDump += `<p>Aktuelle Frage Index: ${questionIndex}</p>`;
        stateDump += `<p>Gesamtpunktzahl (aktuell): ${score}</p>`;
        stateDump += `<h4 style="margin-top: 15px;">Frage-Details:</h4>`;

        if(questions[questionIndex]){
            const q = questions[questionIndex];
            stateDump += `<p><strong>FRAGE:</strong> ${q.question}</p>`;
            
            // Anzeigen der gemischten Antworten und des korrekten Wertes (für Debugging)
            let answersHTML = '<ul style="list-style-type: none; padding-left: 0;">';
            currentShuffledAnswers.forEach((answerText, index) => {
                const isCorrectAnswer = answerText === q.answers[q.correct]; // Prüft den Text gegen das Original-Korrekte
                const status = isCorrectAnswer ? '<span style="color: green; font-weight: bold;">(✅ KORREKT)</span>' : '';
                answersHTML += `<li style="margin-bottom: 5px;"><strong>${String.fromCharCode(65 + index)}:</strong> ${answerText} ${status}</li>`;
            });
            answersHTML += '</ul>';

             stateDump += answersHTML;
        } else {
             stateDump += '<p>Keine Fragen geladen.</p>';
        }


        document.getElementById('debugPanelContent').innerHTML = imageListHTML + stateDump;
        // Debug Panel sichtbar machen
        document.getElementById('debugPanelContent').style.display = 'block';

    } else {
         document.getElementById('debugPanelContent').innerHTML = "<p style='color: red;'>❌ Falsches Passwort.</p>";
         // Debug Panel unsichtbar machen, wenn das Passwort falsch ist
        document.getElementById('debugPanelContent').style.display = 'block'; 
    }

}


function runApiTest() {
    const commandInput = document.getElementById('apiCommandInput');
    const command = commandInput.value.trim().toLowerCase();
    const debugPanel = document.getElementById('debugPanelContent');

    if (command === "anime_quiz") {
        // Hier kommt später die TMDB/RAWG API-Logik hin!
        let message = `\n*** API TEST ERFOLGREICH ***\n`;
        message += `Anfrage für 'Anime Quiz' wurde ausgelöst.\n`;
        message += `Status: WARTE AUF API ENDPOINT. Hier würde der Fetch-Aufruf starten.\n`;
        message += `Vorbereitung abgeschlossen. Kann jetzt die TMDB/RAWG Daten laden!`;

        // Zeige das Ergebnis im Debug Panel an, ohne Quiz zu starten
        debugPanel.innerHTML = message;
        document.getElementById('apiCommandInput').value = ''; // Eingabefeld leeren
        debugPanel.style.display = 'block';

    } else {
         alert("Ungültiger API Command. Bitte geben Sie 'anime_quiz' ein.");
    }
}


// Event Listener für den Theme Toggle (Unverändert)
themeToggleBtn.addEventListener('click', toggleTheme);

// Öffnen/Schließen des Dev Settings Menüs (Erweitert)
devSettingsBtn.addEventListener('click', () => {
    settingsModal.style.display = settingsModal.style.display === 'block' ? 'none' : 'block';
});

// NEUER EVENT LISTENER: Debug-Panel anzeigen, wenn auf den Button geklickt wird
document.getElementById('showDebugBtn').addEventListener('click', showDebugPanel);


// Startfunktionen
checkTheme(); 
loadQuestion();
</script>
