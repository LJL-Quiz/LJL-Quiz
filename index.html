<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮🎬 Quiz für gamer</title>

  <!-- Moderne Schriftart importieren (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

  <!-- 🎨 STYLING & DESIGN (Minimalist High-Tech Dark Mode) -->
  <style>
    /* ========================================= */
    /* --- CSS VARIABLEN FÜR THEME SWITCHING --- */
    /* ========================================= */
    :root {
        --bg-color: #0d1117; /* Dunkler Hintergrund (Dark Mode Default) */
        --text-color: #c9d1d9; 
        --primary-accent: #58a6ff; /* Tech Blue - Akzentfarbe */
        --secondary-bg: #161b22;
        --button-bg: #21262d;
        --shadow-glow: rgba(0, 255, 255, 0.3);
    }

    /* Light Mode Definition */
    body.light-mode {
        --bg-color: #f0f4f8; /* Heller Hintergrund */
        --text-color: #1a202c; /* Dunkler Text */
        --primary-accent: #3b82f6; /* Ein kräftigeres, helleres Blau */
        --secondary-bg: #ffffff;
        --button-bg: #e2e8f0;
        --shadow-glow: rgba(59, 130, 246, 0.3);
    }

    /* ========================================= */
    /* --- GRUNDSTIL & LAYOUT (RESPONSIVE) --- */
    /* ========================================= */
    body {
        background: var(--bg-color);
        color: var(--text-color); 
        font-family: 'Inter', sans-serif;
        padding: 20px;
        transition: background-color 0.5s ease, color 0.5s ease; /* Sanfter Übergang beim Theme Wechsel */
    }

    /* Hauptcontainer für bessere Kontrolle auf kleinen Screens */
    #quiz-container {
        max-width: 800px; 
        margin: 0 auto; 
        padding-bottom: 120px; /* Platzhalter für die Footer/Controls am unteren Rand */
        position: relative; /* Wichtig, damit die Controls positioniert werden können */
    }

    /* ------------------- MENÜ & HEADER ------------------- */
    nav {
        background: var(--secondary-bg); 
        padding: 15px 0;
        margin-bottom: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        display: flex; 
        justify-content: center;
        align-items: center;
    }

    nav a {
        color: var(--primary-accent); 
        margin: 0 15px; 
        text-decoration: none; 
        font-weight: bold;
        transition: color 0.3s ease;
    }

    nav a:hover {
        color: #fff; 
        border-bottom: 2px solid var(--primary-accent); 
    }


    /* ------------------- QUIZ-ELEMENTE (TITEL/BILD) ------------------- */
    h1#quiz-title{
        font-size: clamp(2em, 5vw, 3.5em); 
        color: var(--text-color);
        margin-bottom: 5px;
        text-shadow: 0 0 10px var(--primary-accent); 
    }

    #question-img {
        max-width: 90%; 
        height: auto;
        display: block; 
        margin: 20px auto 30px; 
        border-radius: 15px; 
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); 
        transition: transform 0.3s ease; 
    }

    #question {
        font-size: clamp(1.2em, 3vw, 1.6em); 
        margin-bottom: 40px;
        padding: 0 20px;
    }


    /* ------------------- BUTTONS (Die Interaktion) ------------------- */
    button {
        padding: 15px 30px; 
        font-size: 1.1em; 
        cursor: pointer;
        background-color: var(--button-bg);
        color: var(--text-color);
        border: 2px solid #444;
        margin: 10px 15px;
        transition: all 0.3s ease; 
        border-radius: 8px;
    }

    button:hover {
        background-color: var(--primary-accent); 
        color: #fff;
        transform: translateY(-2px); 
        box-shadow: 0 4px 15px var(--shadow-glow); /* Neon-Schimmer beim Hovern */
    }

    /* ------------------- ERGEBNISSE UND FEEDBACK ------------------- */
    #result {
        font-size: clamp(1.2em, 3vw, 1.8em);
        margin-top: 40px;
        padding: 20px;
        border-radius: 10px;
        transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* Spezielle Klassen für Feedback */
    .correct {
         background-color: rgba(76, 175, 80, 0.2); /* Grüner Schimmer */
         color: #9ae6b4;
    }
    .incorrect {
         background-color: rgba(255, 82, 82, 0.2); /* Roter Schimmer */
         color: #f87171;
    }

  </style>
</head>

<body id="quizBody">

<!-- Controls für Theme & Dev (Unten Links) -->
<div class="controls" style="position: fixed; bottom: 20px; left: 20px; display: flex; gap: 15px;">
    <button class="control-btn" id="themeToggle" title="Theme wechseln (Dark/Light)">🌙</button>
    <button class="control-btn" id="devSettingsBtn" title="Entwickler-Tools">⚙️</button>
</div>

<!-- Quiz Container -->
<div id="quiz-container">
    <!-- Menü -->
    <nav style="margin-bottom: 30px;">
      <a href="#" onclick="selectCategory('spiele'); return false;">🎮 Spiele</a>
      <a href="#" onclick="selectCategory('serien'); return false;">📺 Serien</a>
      <a href="#" onclick="selectCategory('filme'); return false;">🎬 Filme</a>
    </nav>

    <!-- Hier ist der Titel -->
    <h1 id="quiz-title">Quiz für Gamer</h1>
    
    <!-- Bildanzeige -->
    <img id="question-img" src="" alt="Fragebild" />
    <h2 id="question">Bitte wähle eine Kategorie!</h2>

    <!-- Antwort-Buttons -->
    <button onclick="checkAnswer(0)" id="a"></button>
    <button onclick="checkAnswer(1)" id="b"></button>
    <button onclick="checkAnswer(2)" id="c"></button>
    <button onclick="checkAnswer(3)" id="d"></button>

    <!-- Ergebnisanzeige -->
    <p id="result"></p>
</div >


<!-- ⚙️ DEV SETTINGS MODAL (Der "Settings Wheel") -->
<div id="settingsModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.8);">
    <div style="background-color: var(--secondary-bg); margin: 5% auto; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);">
        <h2 style="color: var(--primary-accent); border-bottom: 1px solid #444; padding-bottom: 10px;">⚙️ Entwickler-Konsolen</h2>
        
        <!-- Dev Testing Area -->
        <div style="margin-top: 20px; text-align: left; background: var(--bg-color); padding: 15px; border-radius: 6px;">
            <h3>Aktueller Zustand</h3>
            <p><strong>Theme Mode:</strong> <span id="themeStatus"></span></p>
            <p><strong>Score/Fragen:</strong> <span id="scoreStatus">0 / 0</span></p>
            <p><strong>Quiz Index:</strong> <span id="indexStatus">0</span></p>
        </div>

        <!-- Test-Funktion (zum Beispiel, um zu sehen, ob JS läuft) -->
        <button onclick="console.log('Dev Test erfolgreich!')" style="margin-top: 20px; background-color: #3b82f6;">Test Button klicken</button>
        
        <!-- Schließen-Button -->
        <button onclick="document.getElementById('settingsModal').style.display='none';" style="background-color: red; margin-top: 15px;">Schließen (X)</button>
    </div>
</div >


<script>
// ===========================================================
// LOGIK & FUNKTIONALITÄT
// ===========================================================

let questionIndex = 0;
let score = 0;

const allQuestions = [

  // 🎮 GAMING - SPIELE (WICHTIG: Hier deine korrigierten Pfade!)
  {question: "Wer ist dieser Charakter (God of War)?", answers:["Kratos","Mario","Link","Sonic"], correct:0, img:"Resources/images/placeholder_bild1.jpg", category:"spiele"},
  {question: "Wer ist das?", answers:["Bowser","Donkey Kong","Luigi","Yoshi"], correct:0, img:"Resources/images/placeholder_bild2.jpg", category:"spiele"},
  {question: "Wer ist das?", answers:["Papyrus","Sans","Gaster","Flowey"], correct:0, img:"Resources/images/Glenn Rhee.jpg", category:"spiele"},
  {question: "Welche Nintendo Konsole kam 2002 raus?", answers:["Switch","GameCube","Wii","DS"], correct:1, img:"Resources/images/placeholder_bild4.jpg", category:"spiele"},
  {question: "Meistverkauftes Spiel?", answers:["GTA V","Minecraft","Fortnite","Tetris"], correct:1, img:"Resources/images/placeholder_bild5.jpg", category:"spiele"},
  {question: "GTA 5 Stadt?", answers:["Liberty City","Los Santos","Vice City","San Fierro"], correct:1, img:"Resources/images/placeholder_bild6.jpg", category:"spiele"},
  {question: "SEGA Maskottchen?", answers:["Mario","Sonic","Crash","Rayman"], correct:1, img:"Resources/images/placeholder_bild7.jpg", category:"spiele"},
  {question: "Umbrella kommt vor in?", answers:["Resident Evil","Silent Hill","Outlast","Dead Space"], correct:0, img:"Resources/images/placeholder_bild8.jpg", category:"spiele"},
  {question: "Spiel mit Pilzinfektion?", answers:["The Last of Us","Days Gone","RE4","Metro"], correct:0, img:"Resources/images/placeholder_bild9.jpg", category:"spiele"},
  {question: "Roter Pac-Man Geist?", answers:["Blinky","Pinky","Inky","Clyde"], correct:0, img:"Resources/images/placeholder_bild10.jpg", category:"spiele"},
  {question: "Marios erster Auftritt?", answers:["Mario Bros","Donkey Kong","Zelda","Metroid"], correct:1, img:"Resources/images/placeholder_bild11.jpg", category:"spiele"},
  {question: "Fallout Währung?", answers:["Caps","Dollar","Gold","Coins"], correct:0, img:"Resources/images/placeholder_bild12.jpg", category:"spiele"},

  // 📺 SERIEN
  {question: "Wer ist das?", answers:["Walter White","Jesse Pinkman","Saul Goodman","Hank"], correct:0, category:"serien"}, // KEIN BILD (img leer lassen)
  {question: "Wer ist Glenn?", answers:["The Walking Dead","Lost","Breaking Bad","Dark"], correct:0, category:"serien"}, 
  {question: "Serie mit tödlichen Spielen?", answers:["Squid Game","Alice in Borderland","Saw","Dark"], correct:0, category:"serien"}, 
  {question: "Walter Whites Fach?", answers:["Mathe","Chemie","Bio","Physik"], correct:1, category:"serien"}, 
  {question: "Mädchen mit Kräften?", answers:["Eleven","Max","Nancy","Robin"], correct:0, category:"serien"}, 
  {question: "Wo leben Simpsons?", answers:["Springfield","Quahog","South Park","NY"], correct:0, category:"serien"}, 
  {question: "TWD W auf Stirn?", answers:["Owen","Negan","Rick","Daryl"], correct:0, category:"serien"}, 
  {question: "Blutanalyst + Killer?", answers:["Dexter Morgan","Hannibal","Joe Goldberg","Michael"], correct:0, category:"serien"}, 
  {question: "Kind namens Malcolm?", answers:["Malcolm Mittendrin","Modern Family","Friends","Office"], correct:0, category:"serien"}, 

  // 🎬 FILME
  {question: "Wer ist das?", answers:["Iron Man","Batman","Superman","Thor"], correct:0, img:"Resources/images/placeholder_bild13.jpg", category:"filme"},
  {question: "Wer ist Jason?", answers:["Jason Voorhees","Freddy","Michael Myers","Ghostface"], correct:0, img:"Resources/images/placeholder_bild14.jpg", category:"filme"},
  {question: "Hauself?", answers:["Dobby","Kreacher","Winky","Hedwig"], correct:0, img:"Resources/images/placeholder_bild15.jpg", category:"filme"},
  {question: "Fight Club Regel?", answers:["Nicht reden","Kämpfen","Fliehen","Lachen"], correct:0, img:"Resources/images/placeholder_bild16.jpg", category:"filme"},
  {question: "Scream Regel?", answers:["Bin gleich zurück","Hallo","Lauf","Hilfe"], correct:0, img:"Resources/images/placeholder_bild17.jpg", category:"filme"},
  {question: "Freitag der 13 Killer Teil 1?", answers:["Pamela Voorhees","Jason","Freddy","Ghostface"], correct:0, img:"Resources/images/placeholder_bild18.jpg", category:"filme"},
  {question: "Simba Böser Onkel?", answers:["Scar","Mufasa","Zazu","Rafiki"], correct:0, img:"Resources/images/placeholder_bild19.jpg", category:"filme"},
  {question: "Stunts selbst?", answers:["Jackie Chan","Tom Cruise","The Rock","Vin Diesel"], correct:0, img:"Resources/images/placeholder_bild20.jpg", category:"filme"},
  {question: "Erstes Dino Tier?", answers:["Brachiosaurus","T-Rex","Raptor","Triceratops"], correct:0, img:"Resources/images/placeholder_bild21.jpg", category:"filme"}

];


function loadQuestion(){
    // Aktualisiere die Dev Status Anzeige
    document.getElementById('indexStatus').innerText = questionIndex;
    document.getElementById('scoreStatus').innerText = `${score} / ${questions.length}`;


    if(questions.length === 0){
        document.getElementById("question").innerText = "Bitte wähle eine Kategorie!";
        // Deaktiviere Buttons und Bild bei leerer Auswahl
        document.getElementById("a").style.display = "none";
        document.getElementById("b").style.display = "none";
        document.getElementById("c").style.display = "none";
        document.getElementById("d").style.display = "none";
        document.getElementById("question-img").src = ""; 
        document.getElementById("question-img").style.display = "none";
    }

    let q = questions[questionIndex];
    document.getElementById("question").innerText = q.question;
    document.getElementById("a").innerText = q.answers[0];
    document.getElementById("b").innerText = q.answers[1];
    document.getElementById("c").innerText = q.answers[2];
    document.getElementById("d").innerText = q.answers[3];

    // Buttons anzeigen, falls eine Frage vorhanden ist
    document.getElementById("a").style.display = "inline-block";
    document.getElementById("b").style.display = "inline-block";
    document.getElementById("c").style.display = "inline-block";
    document.getElementById("d").style.display = "inline-block";

    // Bild setzen (wenn img vorhanden ist)
    if(q.img && q.img !== "") {
        document.getElementById("question-img").src = q.img;
        document.getElementById("question-img").style.display = "block";
    } else {
        document.getElementById("question-img").style.display = "none"; // Bild ausblenden, wenn kein Pfad da ist
    }
}

function selectCategory(cat){
    questions = allQuestions.filter(q => q.category === cat);
    questionIndex = 0;
    score = 0;
    document.getElementById("result").innerText = "";
    // Ergebnis-Styling zurücksetzen
    const resultElement = document.getElementById('result');
    resultElement.className = ''; 

    loadQuestion();
}

function checkAnswer(ans){
    const currentQuestion = questions[questionIndex];
    const resultElement = document.getElementById("result"); // Referenz auf das Ergebnis-Element

    // Feedback geben
    if(ans === currentQuestion.correct){
        score++;
        resultElement.innerText = "✅ Richtig!";
        resultElement.className = 'correct'; // Fügt die grüne Klasse hinzu
    } else {
        resultElement.innerText = `❌ Falsch! Die richtige Antwort war: ${currentQuestion.answers[currentQuestion.correct]}`;
        resultElement.className = 'incorrect'; // Fügt die rote Klasse hinzu
    }

    // ⏱️ BUG FIX: Wichtig – Entferne das Styling nach kurzer Zeit
    setTimeout(() => {
        resultElement.innerText = "";
        resultElement.className = ''; // ENTFERNT ALLE KLASSEN (rot/grün)
        
        questionIndex++;
        if(questionIndex < questions.length){
            loadQuestion(); // Nächste Frage laden
        } else {
            // Ende des Quizs
            document.body.innerHTML = `
                <h1 style="color:#58a6ff;">🥳 QUIZ BEENDET!</h1>
                <p style="font-size: 2em; margin-top: 30px;">Du hast ${score} von ${questions.length} Fragen richtig beantwortet!</p>
                <button onclick='window.location.reload()' style='font-size:1.5em; padding:20px 40px;'>Nochmal spielen</button>
            `;
        }
    }, 1800); // Pause von 1,8 Sekunden
}

// ===========================================================
// FUNKTIONALITÄT (THEME & DEV)
// ===========================================================

const body = document.getElementById('quizBody');
const themeToggleBtn = document.getElementById('themeToggle');
const devSettingsBtn = document.getElementById('devSettingsBtn');
const settingsModal = document.getElementById('settingsModal');
const themeStatusSpan = document.getElementById('themeStatus');


// 1. Dark/Light Mode Toggle
function toggleTheme() {
    body.classList.toggle('light-mode');
    if (body.classList.contains('light-mode')) {
        localStorage.setItem('theme', 'light');
        themeToggleBtn.innerHTML = '☀️'; // Sonne für Light Mode
        document.getElementById('themeStatus').innerText = 'LIGHT MODE AKTIV';
    } else {
        localStorage.setItem('theme', 'dark');
        themeToggleBtn.innerHTML = '🌙'; // Mond für Dark Mode
        document.getElementById('themeStatus').innerText = 'DARK MODE AKTIV';
    }
}

// Prüft bei Start, ob der Benutzer eine Präferenz gespeichert hat
function checkTheme() {
    const savedTheme = localStorage.getItem('theme') || 'dark'; 
    if (savedTheme === 'light') {
        body.classList.add('light-mode');
        themeToggleBtn.innerHTML = '☀️'; 
        document.getElementById('themeStatus').innerText = 'LIGHT MODE AKTIV';
    } else {
        themeToggleBtn.innerHTML = '🌙'; 
        document.getElementById('themeStatus').innerText = 'DARK MODE AKTIV';
    }
}

// Event Listener für den Theme Toggle
themeToggleBtn.addEventListener('click', toggleTheme);

// Öffnen/Schließen des Dev Settings Menüs
devSettingsBtn.addEventListener('click', () => {
    settingsModal.style.display = settingsModal.style.display === 'block' ? 'none' : 'block';
});


// Startfunktionen
checkTheme(); 
loadQuestion();

</script>

</body>
</html>
